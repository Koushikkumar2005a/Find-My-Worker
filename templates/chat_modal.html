<!-- Chat Modal -->
<div id="chat-modal" class="chat-modal-overlay">
    <div class="chat-modal">
        <div class="chat-header">
            <h3 id="chat-title">Chat Loading...</h3>
            <button class="chat-close-btn" id="close-chat">&times;</button>
        </div>
        <div class="chat-messages" id="chat-messages-container">
            <!-- Messages will appear here -->
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message (E2E Encrypted)..." class="form-control">
            <button class="btn btn-primary" id="send-chat-btn">Send</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/crypto.js') }}"></script>
<script>
    const CURRENT_USER_ID = parseInt("{{ session.get('user_id') }}");
    let currentChatJobId = null;
    let currentChatReceiverId = null;
    let receiverPublicKeyJwK = null;
    let supabaseSubscription = null;
    let chatPollInterval = null;
    let keyPair = null;
    let displayedMessageIds = new Set();

    window.addEventListener('DOMContentLoaded', async () => {
        keyPair = await ChatCrypto.setupKeys(CURRENT_USER_ID);
        
        document.body.addEventListener('click', async (e) => {
            const btn = e.target.closest('.open-chat-btn');
            if (btn) {
                const jobId = btn.getAttribute('data-job-id');
                const receiverId = btn.getAttribute('data-participant-id');
                const title = btn.getAttribute('data-participant-name');
                await openChat(jobId, receiverId, title);
            }
        });

        document.getElementById('close-chat').addEventListener('click', closeChat);
        document.getElementById('send-chat-btn').addEventListener('click', sendMessage);
        document.getElementById('chat-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    });

    async function openChat(jobId, receiverId, title) {
        closeChat(); // Clean start
        currentChatJobId = jobId;
        currentChatReceiverId = receiverId;
        
        // Reset UI state
        document.getElementById('send-chat-btn').disabled = false;
        document.getElementById('chat-input').disabled = false;
        document.getElementById('chat-input').placeholder = "Type a message (E2E Encrypted)...";
        document.getElementById('chat-title').innerHTML = `Chat with ${title} <span id="chat-status" style="font-size:0.7rem; color:var(--primary-yellow); margin-left:10px;">🟢 Secure Connection</span>`;
        document.getElementById('chat-messages-container').innerHTML = '';
        displayedMessageIds.clear();
        document.getElementById('chat-modal').classList.add('active');
        
        // Always fetch previous messages and start realtime
        await fetchMessages();
        
        if (window.supabase_client) {
            try {
                supabaseSubscription = window.supabase_client
                    .channel(`chat_${jobId}`)
                    .on('postgres_changes', { 
                        event: 'INSERT', 
                        schema: 'public', 
                        table: 'messages',
                        filter: `job_id=eq.${jobId}`
                    }, payload => {
                        handleNewMessage(payload.new);
                    })
                    .subscribe();
            } catch (err) { console.error("Realtime err:", err); }
        }

        // Start fallback polling for robust Hot-Swapping of chat messages
        if (chatPollInterval) clearInterval(chatPollInterval);
        chatPollInterval = setInterval(fetchMessages, 2000);

        // Fetch Receiver's Public Key for sending new messages (Bypassing cache)
        const res = await fetch(`/api/keys/${receiverId}?t=${Date.now()}`, { cache: 'no-store' });
        const data = await res.json();
        if (data.success) {
            receiverPublicKeyJwK = JSON.parse(data.public_key);
        } else {
            const statusEl = document.getElementById('chat-status');
            if (statusEl) {
                statusEl.innerText = " (Reply Unavailable: User key missing)";
                statusEl.style.color = "#ff4444";
            }
            document.getElementById('send-chat-btn').disabled = true;
            document.getElementById('chat-input').placeholder = "You can't reply until the user logs in.";
        }
    }

    async function handleNewMessage(msg) {
        if (!msg || displayedMessageIds.has(msg.id)) return;
        displayedMessageIds.add(msg.id);
        
        let decryptedText = "";
        try {
            if (msg.sender_id == CURRENT_USER_ID) {
                decryptedText = await ChatCrypto.decryptData(msg.encrypted_content_for_sender, keyPair.privateKey);
            } else {
                decryptedText = await ChatCrypto.decryptData(msg.encrypted_content_for_receiver, keyPair.privateKey);
            }
            
            const container = document.getElementById('chat-messages-container');
            const div = document.createElement('div');
            div.className = `chat-message ${msg.sender_id == CURRENT_USER_ID ? 'sent' : 'received'}`;
            div.innerText = decryptedText;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        } catch(e) { console.error("Decryption failed for realtime message", e); }
    }

    function closeChat() {
        document.getElementById('chat-modal').classList.remove('active');
        currentChatJobId = null;
        currentChatReceiverId = null;
        if (supabaseSubscription) {
            window.supabase_client.removeChannel(supabaseSubscription);
            supabaseSubscription = null;
        }
        if (chatPollInterval) {
            clearInterval(chatPollInterval);
            chatPollInterval = null;
        }
    }

    async function fetchMessages() {
        if (!currentChatJobId) return;
        const res = await fetch(`/api/chat/${currentChatJobId}`);
        const data = await res.json();
        if (data.success) {
            const container = document.getElementById('chat-messages-container');
            for (let msg of data.messages) {
                if (displayedMessageIds.has(msg.id)) continue;
                displayedMessageIds.add(msg.id);

                let decryptedText = "";
                try {
                    if (msg.sender_id == CURRENT_USER_ID) {
                        decryptedText = await ChatCrypto.decryptData(msg.encrypted_content_for_sender, keyPair.privateKey);
                    } else {
                        decryptedText = await ChatCrypto.decryptData(msg.encrypted_content_for_receiver, keyPair.privateKey);
                    }
                } catch(e) {
                    console.error("Decryption failed for message", msg.id, e);
                    decryptedText = "[Old Message: Key Mismatch]";
                }
                
                const div = document.createElement('div');
                div.className = `chat-message ${msg.sender_id == CURRENT_USER_ID ? 'sent' : 'received'}`;
                
                if (decryptedText.includes("[Decryption Error")) {
                    div.innerHTML = `<span style="opacity: 0.5; font-style: italic; font-size: 0.8rem;">🔒 Message from a previous session</span>`;
                } else {
                    div.innerText = decryptedText;
                }
                
                container.appendChild(div);
            }
            container.scrollTop = container.scrollHeight;
        }
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || !currentChatJobId || !receiverPublicKeyJwK) return;

        input.value = '';
        input.disabled = true;

        try {
            const encForReceiver = await ChatCrypto.encryptData(text, receiverPublicKeyJwK);
            const encForSender = await ChatCrypto.encryptData(text, keyPair.publicKey);

            await fetch('/api/chat/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    job_id: currentChatJobId,
                    receiver_id: currentChatReceiverId,
                    enc_for_receiver: encForReceiver,
                    enc_for_sender: encForSender
                })
            });
            // Instantly fetch newly sent messages locally 
            fetchMessages(); 
        } catch(e) {
            console.error(e);
            alert("Failed to send encrypted message. Message might be too long.");
        } finally {
            input.disabled = false;
            input.focus();
        }
    }
</script>
